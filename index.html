<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stella OS: Layered</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-card: #141417;
            --bg-input: #1d1d21;
            --text-primary: #fcfcfd;
            --text-secondary: #9ea3ae;
            --border-color: rgba(255,255,255,0.08);
            --key-color: #00e5ff;
            --key-color-rgb: 0, 229, 255;
            --danger-color: #ff3b30;
            --ease-out-quint: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-base); 
            margin: 0; color: var(--text-primary); overflow: hidden; height: 100vh;
        }

        /* 布局 */
        header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .input-console { padding: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        .input-wrapper { background: var(--bg-input); border-radius: 12px; border: 1px solid var(--border-color); padding: 4px 12px; display: flex; align-items: center; }
        #task-input { flex: 1; border: none; background: transparent; font-size: 16px; outline: none; padding: 12px 0; color: var(--text-primary); }
        .add-btn { background: transparent; border: 1px solid var(--key-color); color: var(--key-color); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }

        .main-scroller { flex: 1; overflow-y: scroll; height: calc(100vh - 180px); -webkit-overflow-scrolling: touch; }

        /* 任务卡片高级结构 */
        .task-card-viewport { position: relative; overflow: hidden; margin-bottom: 1px; }
        .card-action-back { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        .action-delete { color: var(--danger-color); font-weight: 600; }

        .task-card-body {
            background: var(--bg-card); position: relative; z-index: 2;
            transition: transform 0.4s var(--ease-out-quint);
        }

        .main-content { padding: 20px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }

        /* 进度圆环 */
        .progress-ring { width: 36px; height: 36px; position: relative; }
        .progress-ring svg { transform: rotate(-90deg); width: 36px; height: 36px; }
        .progress-ring circle { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s var(--ease-out-quint); }
        .ring-bg { stroke: rgba(255,255,255,0.05); }
        .ring-fill { stroke: var(--key-color); stroke-dasharray: 100.5; stroke-dashoffset: 100.5; }
        .progress-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--key-color); }

        .task-info { flex: 1; }
        .task-title { font-size: 15px; margin: 0; font-weight: 400; }
        .task-meta { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .expand-icon { color: var(--text-secondary); transition: transform 0.3s; }
        .expanded .expand-icon { transform: rotate(180deg); color: var(--key-color); }

        /* 子任务列表（折叠区） */
        .subtask-container {
            max-height: 0; overflow: hidden; transition: max-height 0.4s var(--ease-out-quint);
            background: rgba(0,0,0,0.1); padding: 0 20px;
        }
        .expanded .subtask-container { max-height: 500px; padding-bottom: 20px; }

        .subtask-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 0;
            border-top: 1px solid var(--border-color);
        }
        .sub-check { 
            width: 18px; height: 18px; border: 1px solid var(--text-secondary); 
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .sub-check.checked { background: var(--key-color); border-color: var(--key-color); }
        .sub-check.checked::after { content: '✓'; color: #000; font-size: 12px; font-weight: bold; }
        .sub-text { font-size: 13px; color: var(--text-secondary); }
        .sub-text.completed { text-decoration: line-through; opacity: 0.5; }

        .sub-input-row { display: flex; gap: 10px; margin-top: 10px; }
        .sub-input { 
            flex: 1; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-primary); padding: 8px; font-size: 12px; outline: none;
        }

        .mandatory-tag { font-size: 10px; background: rgba(255, 59, 48, 0.1); color: var(--danger-color); padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

<header>
    <h1>T A S K</h1>
    <div id="net-status" style="font-size: 10px; color: var(--key-color);">SYSTEM ACTIVE</div>
</header>

<div class="input-console">
    <div class="input-wrapper">
        <input type="text" id="task-input" placeholder="输入核心项目">
        <button class="add-btn" onclick="addTask()">+</button>
    </div>
    <div style="margin-top: 10px; font-size: 12px; color: var(--text-secondary);">
        <input type="checkbox" id="is-mandatory"> 强制执行协议
    </div>
</div>

<div class="main-scroller">
    <div id="task-list"></div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('stella_v4_tasks')) || [];

    function addTask() {
        const input = document.getElementById('task-input');
        const isMandatory = document.getElementById('is-mandatory').checked;
        if (!input.value) return;

        const task = {
            id: Date.now(),
            name: input.value,
            mandatory: isMandatory,
            expanded: false,
            progress: 0,
            subtasks: []
        };

        tasks.unshift(task);
        save();
        input.value = '';
        document.getElementById('is-mandatory').checked = false;
    }

    function addSubTask(parentId) {
        const input = document.getElementById(`input-${parentId}`);
        if (!input.value) return;

        tasks = tasks.map(t => {
            if (t.id === parentId) {
                const newSub = { id: Date.now(), name: input.value, completed: false };
                const updatedSubtasks = [...t.subtasks, newSub];
                return { ...t, subtasks: updatedSubtasks, progress: calculateProgress(updatedSubtasks) };
            }
            return t;
        });
        save();
    }

    function toggleSubtask(parentId, subId) {
        tasks = tasks.map(t => {
            if (t.id === parentId) {
                const updatedSubtasks = t.subtasks.map(s => s.id === subId ? { ...s, completed: !s.completed } : s);
                return { ...t, subtasks: updatedSubtasks, progress: calculateProgress(updatedSubtasks) };
            }
            return t;
        });
        save();
    }

    function calculateProgress(subtasks) {
        if (subtasks.length === 0) return 0;
        const done = subtasks.filter(s => s.completed).length;
        return Math.round((done / subtasks.length) * 100);
    }

    function toggleExpand(id) {
        // 避免点击子任务输入框时折叠
        tasks = tasks.map(t => t.id === id ? { ...t, expanded: !t.expanded } : t);
        render();
    }

    function save() {
        localStorage.setItem('stella_v4_tasks', JSON.stringify(tasks));
        render();
    }

    function render() {
        const list = document.getElementById('task-list');
        list.innerHTML = tasks.map(t => {
            const offset = 100.5 - (t.progress / 100) * 100.5;
            return `
            <div class="task-card-viewport ${t.expanded ? 'expanded' : ''}" id="vp-${t.id}">
                <div class="card-action-back">
                    <div></div><div class="action-delete" onclick="deleteTask(${t.id})">DELETE</div>
                </div>
                <div class="task-card-body" data-id="${t.id}" id="body-${t.id}">
                    <div class="main-content" onclick="toggleExpand(${t.id})">
                        <div class="progress-ring">
                            <svg viewBox="0 0 36 36">
                                <circle class="ring-bg" cx="18" cy="18" r="16"></circle>
                                <circle class="ring-fill" cx="18" cy="18" r="16" style="stroke-dashoffset: ${offset}"></circle>
                            </svg>
                            <div class="progress-text">${t.progress}%</div>
                        </div>
                        <div class="task-info">
                            <p class="task-title">${t.name} ${t.mandatory ? '<span class="mandatory-tag">MANDATORY</span>' : ''}</p>
                            <p class="task-meta">${t.subtasks.length} 子任务 · 逻辑已锁定</p>
                        </div>
                        <div class="expand-icon">▼</div>
                    </div>
                    
                    <div class="subtask-container" onclick="event.stopPropagation()">
                        ${t.subtasks.map(s => `
                            <div class="subtask-item" onclick="toggleSubtask(${t.id}, ${s.id})">
                                <div class="sub-check ${s.completed ? 'checked' : ''}"></div>
                                <span class="sub-text ${s.completed ? 'completed' : ''}">${s.name}</span>
                            </div>
                        `).join('')}
                        <div class="sub-input-row">
                            <input type="text" class="sub-input" id="input-${t.id}" placeholder="添加子步骤...">
                            <button class="add-btn" style="font-size:16px" onclick="addSubTask(${t.id})">+</button>
                        </div>
                    </div>
                </div>
            </div>
        `}).join('');
        initSwipe();
    }

    // 滑动交互逻辑
    function initSwipe() {
        tasks.forEach(t => {
            const el = document.getElementById(`body-${t.id}`);
            let startX = 0;
            let currentX = 0;

            el.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                el.style.transition = 'none';
            }, {passive: true});

            el.addEventListener('touchmove', e => {
                currentX = e.touches[0].clientX - startX;
                if (currentX < 0) { // 只允许左滑删除
                    const dampen = currentX < -100 ? -100 + (currentX + 100) * 0.2 : currentX;
                    el.style.transform = `translateX(${dampen}px)`;
                }
            }, {passive: true});

            el.addEventListener('touchend', () => {
                el.style.transition = 'transform 0.5s var(--ease-out-quint)';
                if (currentX < -80) {
                    el.style.transform = 'translateX(-100%)';
                    setTimeout(() => deleteTask(t.id), 300);
                } else {
                    el.style.transform = 'translateX(0)';
                }
            });
        });
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
    }

    render();
</script>
</body>
</html>
